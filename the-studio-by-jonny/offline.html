<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d0c">
  <title>The Studio by Jonny | Offline</title>
  <link rel="icon" href="icon-32.png">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;padding:28px;color:#f3eadb;background:#0b0d0c;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}.card{width:min(100%,560px);padding:38px 28px;border:1px solid rgba(184,154,90,.35);background:#131614;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35)}img{width:110px;height:110px;object-fit:cover;border:1px solid rgba(184,154,90,.4)}.eyebrow{margin:22px 0 12px;color:#b89a5a;font-size:.65rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase}h1{margin:0 0 16px;font-family:Impact,"Arial Narrow",sans-serif;font-size:clamp(2.8rem,12vw,5rem);letter-spacing:-.04em;line-height:.88}p{margin:0 auto 26px;max-width:420px;color:#9b9d95;line-height:1.65}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}a{display:grid;min-height:52px;place-items:center;color:#f3eadb;border:1px solid rgba(243,234,219,.3);font-size:.72rem;font-weight:900;letter-spacing:.08em;text-decoration:none;text-transform:uppercase}a:first-child{background:#8a1d27;border-color:#8a1d27}@media(max-width:440px){.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="card">
    <img src="brand-mark.png" alt="The Studio by Jonny monogram">
    <p class="eyebrow">The Studio / By Jonny</p>
    <h1>You are offline.</h1>
    <p>The saved portfolio and service details may still be available. Reconnect to see live Booksy availability or reserve an appointment.</p>
    <div class="actions">
      <a href="./">Try again</a>
      <a href="./#services">View services</a>
    </div>
  </main>
</body>
</html>
